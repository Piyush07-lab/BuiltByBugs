<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/logo.css">
    <link rel="stylesheet" href="styles/about.css">
    <link rel="stylesheet" href="styles/project.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/github.css">
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/media.css">
    <link rel="stylesheet" href="styles/theme.css">
    <title>About</title>
</head>

<body>

    <canvas id="backgroundCanvas"></canvas>

    <header class="header layout-header" role="banner" aria-label="Site header">
        <a class="logo-link" href="index.html">
            <div class="logo-container" role="banner" aria-label="OCDbug logo">
                <div class="logo-core">
                    <span id="logo-o" class="logo-letter">O</span>
                    <span id="logo-c" class="logo-letter">C</span>
                    <span id="logo-d" class="logo-letter">D</span>
                </div>
                <div class="logo-text"><span id="bug-b">b</span>ug</div>
            </div>
        </a>

        <div class="nav-container layout-nav-container">
            <nav class="nav" aria-label="Primary navigation">
                <ul class="nav-links layout-nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="aboutMe.html">About</a></li>
                    <li><a href="project.html">Project</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>

        </div>

        <div class="cta-container layout-cta">
            <button class="cta-button component-button" id="hireMeBtn">
                <span>Hire Me!</span>
            </button>
        </div>

        <div id="hireModal" class="modal component-modal hidden">
            <div class="modal-content">
                <span class="close component-modal-close">&times;</span>
                <h2>Hire Me</h2>
                <form id="hireForm">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email" required>

                    <label for="message">Message:</label>
                    <textarea name="message" id="message" required></textarea>

                    <button type="submit">Send Request</button>
                </form>
            </div>
        </div>

    </header>

    <div class="introduction">

        <div class="logo-container" role="banner" aria-label="OCDbug logo">
            <div class="logo-core">
                <span id="logo-o" class="logo-letter">O</span>
                <span id="logo-c" class="logo-letter">C</span>
                <span id="logo-d" class="logo-letter">D</span>
            </div>
            <div class="logo-text"><span id="bug-b">b</span>ug</div>

        </div>


    </div>

    <footer class="footer layout-footer">

        <div class="shortcuts layout-footer-shortcuts">

            <div class="quick-links component-link-list">
                <ul class="quick-links-list">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="aboutMe.html">About</a></li>
                    <li><a href="project.html">Projects</a></li>
                </ul>
            </div>

            <div class="quick-links component-link-list">
                <ul class="quick-links-list">
                    <li><a href="/">Contact</a></li>
                    <li><a href="/">Help</a></li>
                    <li><a href="/">Blogs</a></li>
                </ul>
            </div>

        </div>

        <div class="social-links layout-social-links">
            <ul>
                <li><a href="/">
                    <i class='bx bxl-github'></i>
                </a></li>
                <li><a href="/">
                    <i class='bx bxl-linkedin' ></i>
                </a></li>
                <li><a href="/">
                    <i class='bx bxl-twitter' ></i>
                </a></li>
            </ul>
        </div>

    </footer>

    <script type="module" src="js/main.js"></script>


</body>

</html>
