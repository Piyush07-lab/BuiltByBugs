<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Portfolio #1</title>
</head>

<body>
    <header class="header" role="banner" aria-label="Site header">
        <a class="logo-link" href="index.html">
            <div class="logo-container" role="banner" aria-label="OCDbug logo">
                <div class="logo-core">
                    <span id="logo-o" class="logo-letter">O</span>
                    <span id="logo-c" class="logo-letter">C</span>
                    <span id="logo-d" class="logo-letter">D</span>
                </div>
                <div class="logo-text"><span id="bug-b">b</span>ug</div>
            </div>
        </a>

        <div class="nav-container">
            <nav class="nav" aria-label="Primary naigation">
                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Project</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>

        </div>

        <div id="clockBox" class="clock-box">
            ⏲️Local Time:
        </div>

        <div class="cta-container">
            <button class="cta-button">Hire Me!</button>
        </div>

    </header>

    <section id="mainSection">

        <div class="mainOne">

            <div class="mainOneText">

                <div class="logo-container" role="banner" aria-label="OCDbug logo">
                    <div class="logo-core">
                        <span id="logo-o" class="logo-letter">O</span>
                        <span id="logo-c" class="logo-letter">C</span>
                        <span id="logo-d" class="logo-letter">D</span>
                    </div>
                    <div class="logo-text"><span id="bug-b">b</span>ug</div>

                </div>

                <h1>Hi, I'm <span class="name">Piyush</span></h1>
                <p>I craft things .</p>
                <button class="cta-button">See My Work</button>

            </div>

        </div>

        <div class="mainTwo" id="middleToggle">

            <div class="toggle-bar" id="toggleBar"></div>

            <ul class="quick-links">

                <li><a href="#">Blog</a></li>
                <li><a href="#">Status</a></li>
                <li><a href="#">Projects</a></li>
                <li><a href="#">Contact</a></li>

            </ul>

        </div>

        <div class="mainThree">

            <div class="statsBox">

                <h2>Status</h2>
                <p>GitHub active.</p>

                <div id="githubStats" class="github-status-box"></div>

                <div class="contribution-chart-container">
                    <img src="https://ghchart.rshah.org/00ff99/Piyush07-lab" alt="GitHub Contribution Chart">
                </div>

            </div>

        </div>

    </section>

    <section id="githubProjects">
        <h2>Latest GitHub Repos</h2>
        <ul id="repoList"></ul>
    </section>

    <script src="script.js"></script>

</body>

</html>
