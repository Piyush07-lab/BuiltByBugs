<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>About</title>
</head>

<body>

    <header class="header" role="banner" aria-label="Site header">
        <a class="logo-link" href="index.html">
            <div class="logo-container" role="banner" aria-label="OCDbug logo">
                <div class="logo-core">
                    <span id="logo-o" class="logo-letter">O</span>
                    <span id="logo-c" class="logo-letter">C</span>
                    <span id="logo-d" class="logo-letter">D</span>
                </div>
                <div class="logo-text"><span id="bug-b">b</span>ug</div>
            </div>
        </a>

        <div class="nav-container">
            <nav class="nav" aria-label="Primary navigation">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="aboutMe.html">About</a></li>
                    <li><a href="project.html">Project</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>

        </div>

        <div class="cta-container">
            <button class="cta-button" id="hireMeBtn">
                <span>Hire Me!</span>
            </button>
        </div>

        <div id="hireModal" class="modal hidden">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Hire Me</h2>
                <form id="hireForm">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email" required>

                    <label for="message">Message:</label>
                    <textarea name="message" id="message" required></textarea>

                    <button type="submit">Send Request</button>
                </form>
            </div>
        </div>

    </header>

    <div class="introduction">

        <div class="logo-container" role="banner" aria-label="OCDbug logo">
            <div class="logo-core">
                <span id="logo-o" class="logo-letter">O</span>
                <span id="logo-c" class="logo-letter">C</span>
                <span id="logo-d" class="logo-letter">D</span>
            </div>
            <div class="logo-text"><span id="bug-b">b</span>ug</div>

        </div>


    </div>


</body>

</html>
